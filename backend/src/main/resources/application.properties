spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# PostgreSQL connection for local development.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/campuskonnect}
spring.datasource.username=${DB_USERNAME:campuskonnect}
spring.datasource.password=${DB_PASSWORD:campuskonnect}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

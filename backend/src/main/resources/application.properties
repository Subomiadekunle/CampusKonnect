spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Local development database (PostgreSQL on your laptop).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/campuskonnect}
spring.datasource.username=${DB_USERNAME:campuskonnect}
spring.datasource.password=${DB_PASSWORD:campuskonnect}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=60000

# Redis for local development
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# SendGrid (optional for local dev — verification codes are logged if unset)
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@campuskonnect.local}

# Listing image uploads
listing.images.upload-dir=${LISTING_IMAGES_UPLOAD_DIR:uploads/listings}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=80MB
